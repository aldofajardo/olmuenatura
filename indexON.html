<title>Olmué Natura Lodge & Spa · Terra Viva</title>
<meta name="description" content="Olmué Natura Lodge & Spa y Terra Viva Multiespacio — Experiencias en el Valle del Aconcagua, Olmué, Chile.">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0a;
  }

  .hero {
    display: flex;
    width: 100%;
    height: 100vh;
    height: 100dvh;
  }

  .panel {
    position: relative;
    flex: 1;
    overflow: hidden;
    cursor: pointer;
    display: block;
    text-decoration: none;
  }

  .panel__img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                filter 0.5s ease;
  }

  .panel:hover .panel__img {
    transform: scale(1.03);
  }

  .panel--terra:hover .panel__img {
    filter: brightness(1.08);
  }

  .panel--olmue:hover .panel__img {
    filter: brightness(1.06) saturate(1.05);
  }

  .panel::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
    z-index: 2;
  }

  .panel--terra::after {
    background: radial-gradient(ellipse at center 70%, rgba(160,17,39,0.15) 0%, transparent 70%);
  }

  .panel--olmue::after {
    background: radial-gradient(ellipse at center 70%, rgba(42,90,58,0.12) 0%, transparent 70%);
  }

  .panel:hover::after {
    opacity: 1;
  }

  .panel:focus-visible {
    outline: 3px solid #FAF7F2;
    outline-offset: -3px;
    z-index: 5;
  }

  /* Desktop: side by side */
  .panel__img--mobile { display: none; }
  .panel__img--desktop { display: block; }

  /* Mobile: stack vertically, show mobile images */
  @media (max-width: 768px) {
    .hero {
      flex-direction: column;
    }
    .panel__img--desktop { display: none; }
    .panel__img--mobile { display: block; }
  }

  /* Fade-in on load */
  .panel {
    opacity: 0;
    animation: panelIn 0.8s ease forwards;
  }
  .panel--terra { animation-delay: 0.1s; }
  .panel--olmue { animation-delay: 0.3s; }

  @keyframes panelIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
